name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate snake assets
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Pay4att
          outputs: |
            assets/github-contribution-grid-snake.svg?palette=github-dark&color_snake=%232ea043&color_dots=%23161b22,%230e4429,%23006d32,%2326a641,%2339d353

      - name: Commit snake asset
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add assets/github-contribution-grid-snake.svg
          if git diff --cached --quiet; then
            echo "No snake changes to commit"
          else
            git commit -m "chore: update contribution snake"
            git push
          fi
