name: Update GitHub Activity

on:
  schedule:
    - cron: "45 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate GitHub activity
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-github-activity.mjs

      - name: Commit updated activity
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add assets/github-activity.svg
          if git diff --cached --quiet; then
            echo "GitHub activity is already up to date"
          else
            git commit -m "chore: update GitHub activity"
            git push
