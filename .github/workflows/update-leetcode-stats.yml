name: Update LeetCode Stats

on:
  schedule:
    - cron: "30 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate LeetCode China stats
        run: node scripts/update-leetcode-stats.mjs

      - name: Commit updated stats
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add assets/leetcode-stats.svg
          if git diff --cached --quiet; then
            echo "LeetCode stats are already up to date"
          else
            git commit -m "chore: update LeetCode stats"
            git push
          fi
